<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mystic Node</title>
    <style>
        :root {
            --bg-color: #0d0d12;
            --card-bg: #1a1a24;
            --neon-green: #39ff14;
            --neon-red: #ff073a;
            --text-color: #e0e0e0;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Smaller Floating Characters */
        .cartoon {
            position: absolute;
            font-size: 45px; /* Shrunk from 80px */
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
            animation: float 6s ease-in-out infinite;
            z-index: 0;
        }
        .wizard { top: 20%; left: 15%; animation-delay: 0s; }
        .robot { bottom: 20%; right: 15%; animation-delay: 3s; font-size: 50px; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* Compact Game Card */
        #game-box {
            background-color: var(--card-bg);
            padding: 25px; /* Shrunk from 40px */
            border-radius: 16px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.8), 0 0 10px rgba(100, 100, 255, 0.1) inset;
            text-align: center;
            max-width: 320px; /* Shrunk from 500px */
            width: 85%;
            z-index: 10;
            border: 1px solid #2a2a35;
        }

        h1 {
            font-size: 1.1rem; /* Shrunk from 1.5rem */
            min-height: 60px; /* Shrunk from 80px */
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
            margin-top: 0;
        }

        /* Compact Neon Buttons */
        .btn {
            padding: 10px 20px; /* Shrunk from 15px 35px */
            margin: 8px;
            font-size: 14px; /* Shrunk from 18px */
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(0.95);
        }

        .yes {
            background: transparent;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 8px rgba(57, 255, 20, 0.2);
        }

        .yes:hover:not(:disabled) {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 15px var(--neon-green);
        }

        .no {
            background: transparent;
            color: var(--neon-red);
            border: 2px solid var(--neon-red);
            box-shadow: 0 0 8px rgba(255, 7, 58, 0.2);
        }

        .no:hover:not(:disabled) {
            background: var(--neon-red);
            color: #000;
            box-shadow: 0 0 15px var(--neon-red);
        }

        /* Pulse animation for thinking */
        .thinking {
            animation: pulse 1.5s infinite;
            color: #aaa;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="cartoon wizard">🧙‍♂️</div>
    <div class="cartoon robot">🤖</div>

    <div id="game-box">
        <h1 id="question" class="thinking">Awakening...</h1>
        <div id="controls" style="display: none;">
            <button id="btn-yes" class="btn yes" onclick="sendMove('Yes')">YES</button>
            <button id="btn-no" class="btn no" onclick="sendMove('No')">NO</button>
        </div>
        <div id="result-controls" style="display: none;">
            <button class="btn yes" onclick="location.reload()">I WON!</button>
            <button class="btn no" onclick="learn()">FAILED.</button>
        </div>
    </div>

  <script>
        let history = [];
        let currentGuess = "";
        
        const questionEl = document.getElementById('question');
        const controls = document.getElementById('controls');
        const resultControls = document.getElementById('result-controls');
        const btnYes = document.getElementById('btn-yes');
        const btnNo = document.getElementById('btn-no');

        function setLoading(isLoading) {
            if (isLoading) {
                questionEl.classList.add('thinking');
                btnYes.disabled = true;
                btnNo.disabled = true;
            } else {
                questionEl.classList.remove('thinking');
                btnYes.disabled = false;
                btnNo.disabled = false;
                controls.style.display = 'block';
            }
        }

        async function sendMove(input) {
            setLoading(true);
            const actualInput = input === 'Start' ? "Let's start" : input;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ history, userInput: actualInput })
                });
                
                if (!res.ok) throw new Error("Server error");
                const data = await res.json();
                
                // If the backend sent an error message disguised as a question
                if (data.question && data.question.includes("SERVER ERROR")) {
                    questionEl.innerText = data.question;
                    setLoading(false);
                    return;
                }

                if (data.isGuess) {
                    currentGuess = data.finalAnswer;
                    questionEl.innerText = `Is it ${data.finalAnswer}?`;
                    controls.style.display = 'none';
                    resultControls.style.display = 'block';
                    questionEl.classList.remove('thinking');
                    
                    // Save history so it can learn if it failed
                    history.push({ role: "user", text: actualInput });
                    history.push({ role: "model", text: JSON.stringify(data) });
                } else {
                    questionEl.innerText = data.question;
                    
                    // THE FIX: Perfect ping-pong history (User first, then Model)
                    history.push({ role: "user", text: actualInput });
                    history.push({ role: "model", text: JSON.stringify(data) });
                    
                    setLoading(false);
                }
            } catch (error) {
                console.error(error);
                questionEl.innerText = "Connection lost to the Mystic Node. Try again.";
                setLoading(false);
            }
        }

        async function learn() {
            const correctThing = prompt("You defeated me! What was it?");
            if (!correctThing) return;

            questionEl.innerText = "Analyzing...";
            questionEl.classList.add('thinking');
            resultControls.style.display = 'none';

            try {
                await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ history, isCorrection: true, correctThing })
                });
                alert("Knowledge absorbed. I am smarter now.");
            } catch (err) {
                alert("Failed to save memory.");
            }
            location.reload();
        }

        // Start game automatically on load
        window.onload = () => sendMove('Start');
    </script>
</body>
</html>
