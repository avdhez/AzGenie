<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mystic Node</title>
    <style>
        :root {
            --bg-color: #0d0d12;
            --card-bg: #1a1a24;
            --neon-green: #39ff14;
            --neon-red: #ff073a;
            --neon-yellow: #ffeb3b;
            --neon-purple: #b026ff;
            --text-color: #e0e0e0;
        }

        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; position: relative;
        }

        .cartoon {
            position: absolute; font-size: 45px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
            animation: float 6s ease-in-out infinite; z-index: 0;
        }
        .wizard { top: 20%; left: 15%; animation-delay: 0s; }
        .robot { bottom: 20%; right: 15%; animation-delay: 3s; font-size: 50px; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        #game-box {
            background-color: var(--card-bg); padding: 25px; border-radius: 16px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.8), 0 0 10px rgba(100, 100, 255, 0.1) inset;
            text-align: center; max-width: 350px; width: 85%; z-index: 10; border: 1px solid #2a2a35;
            position: relative;
        }

        /* Top Bar for New Game Button */
        .top-bar {
            display: flex; justify-content: flex-end; margin-bottom: 10px;
        }
        
        .reset-btn {
            background: transparent; color: #888; border: 1px solid #444; 
            border-radius: 4px; padding: 5px 10px; font-size: 12px; cursor: pointer;
            transition: 0.3s;
        }
        .reset-btn:hover { color: #fff; border-color: #fff; }

        h1 { font-size: 1.1rem; min-height: 60px; display: flex; align-items: center; justify-content: center; margin-top: 0; }

        #controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }

        .btn {
            padding: 10px 15px; font-size: 13px; font-weight: bold; border: none;
            border-radius: 6px; cursor: pointer; transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 1px; flex: 1 1 40%;
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: scale(0.95); }

        .yes { background: transparent; color: var(--neon-green); border: 2px solid var(--neon-green); }
        .yes:hover:not(:disabled) { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); }

        .no { background: transparent; color: var(--neon-red); border: 2px solid var(--neon-red); }
        .no:hover:not(:disabled) { background: var(--neon-red); color: #000; box-shadow: 0 0 15px var(--neon-red); }

        .maybe { background: transparent; color: var(--neon-yellow); border: 2px solid var(--neon-yellow); }
        .maybe:hover:not(:disabled) { background: var(--neon-yellow); color: #000; box-shadow: 0 0 15px var(--neon-yellow); }

        .dk { background: transparent; color: var(--neon-purple); border: 2px solid var(--neon-purple); }
        .dk:hover:not(:disabled) { background: var(--neon-purple); color: #fff; box-shadow: 0 0 15px var(--neon-purple); }

        .thinking { animation: pulse 1.5s infinite; color: #aaa; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="cartoon wizard">🧙‍♂️</div>
    <div class="cartoon robot">🤖</div>

    <div id="game-box">
        <div class="top-bar">
            <button class="reset-btn" onclick="restartGame()">↻ Restart</button>
        </div>

        <h1 id="question" class="thinking">Awakening...</h1>
        
        <div id="controls" style="display: none;">
            <button class="btn yes" onclick="sendMove('Yes')">YES</button>
            <button class="btn no" onclick="sendMove('No')">NO</button>
            <button class="btn maybe" onclick="sendMove('Maybe')">MAYBE</button>
            <button class="btn dk" onclick="sendMove('I do not know')">DON'T KNOW</button>
        </div>
        
        <div id="result-controls" style="display: none;">
            <button class="btn yes" onclick="restartGame()" style="flex: 1 1 100%;">I WON! (Play Again)</button>
            <button class="btn no" onclick="learn()" style="flex: 1 1 100%; margin-top: 10px;">YOU FAILED.</button>
        </div>
    </div>

    <script>
        let history = [];
        const questionEl = document.getElementById('question');
        const controls = document.getElementById('controls');
        const resultControls = document.getElementById('result-controls');
        const buttons = document.querySelectorAll('.btn');

        function setLoading(isLoading) {
            if (isLoading) {
                questionEl.classList.add('thinking');
                buttons.forEach(b => b.disabled = true);
            } else {
                questionEl.classList.remove('thinking');
                buttons.forEach(b => b.disabled = false);
                controls.style.display = 'flex';
            }
        }

        // New function to handle New Chats cleanly
        function restartGame() {
            history = []; // Wipes the memory for this user
            resultControls.style.display = 'none';
            controls.style.display = 'none';
            sendMove('Start'); // Starts a fresh game
        }

        async function sendMove(input) {
            setLoading(true);
            const actualInput = input === 'Start' ? "Let's start" : input;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ history, userInput: actualInput })
                });
                
                const data = await res.json();

                if (data.isRateLimit) {
                    questionEl.innerText = data.question;
                    questionEl.style.color = "var(--neon-yellow)"; 
                    setTimeout(() => { questionEl.style.color = "var(--text-color)"; }, 3000);
                    setLoading(false);
                    return;
                }

                if (data.question && data.question.includes("ERROR")) {
                    questionEl.innerText = data.question;
                    setLoading(false);
                    return;
                }

                if (data.isGuess) {
                    questionEl.innerText = `Is it ${data.finalAnswer}?`;
                    controls.style.display = 'none';
                    resultControls.style.display = 'flex';
                    resultControls.style.flexWrap = 'wrap';
                    questionEl.classList.remove('thinking');
                    
                    history.push({ role: "user", text: actualInput });
                    history.push({ role: "model", text: JSON.stringify(data) });
                } else {
                    questionEl.innerText = data.question;
                    history.push({ role: "user", text: actualInput });
                    history.push({ role: "model", text: JSON.stringify(data) });
                    setLoading(false);
                }
            } catch (error) {
                console.error(error);
                questionEl.innerText = `FRONTEND CRASH: ${error.message}`;
                setLoading(false);
            }
        }

        async function learn() {
            const correctThing = prompt("You defeated me! What was it?");
            if (!correctThing) return;

            questionEl.innerText = "Analyzing...";
            questionEl.classList.add('thinking');
            resultControls.style.display = 'none';

            try {
                await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ history, isCorrection: true, correctThing })
                });
                alert("Knowledge absorbed. I am smarter now.");
            } catch (err) {
                alert("Failed to save memory.");
            }
            restartGame(); // Restart cleanly after learning
        }

        window.onload = () => sendMove('Start');
    </script>
</body>
</html>
